# This will set the replicaset count 
replicaCount: 1

# This sets the container image 
image:
  repository:  clickhouse/clickhouse-server
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "25.7-alpine"


# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""


# This is for setting Kubernetes Labels to a Pod.
podLabels: {
  app: clickhouse
}

strategy:
  type: Recreate

# This is for setting up a service 
service:
  # This sets the service type more
  type: ClusterIP
  # This sets the ports 
  httpPort: 8123
  nativePort: 9000


# This block is for setting up the ingress  !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!1
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
    # - secretName: chart-example-tls
    #   hosts:
    #     - chart-example.local


resources: 
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  requests:
  #   cpu: 100m
  #   memory: 128Mi
    storage: 1Gi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

# Additional volumes on the output Deployment definition. !!!!!!!!!!!!!!!!!!!!!!!!!!
# volumes:
#   - name: config
#     configMap:
#       name: "{{ include \"task2.fullname\" . }}-config"
#   - name: users
#     configMap:
#       name: "{{ include \"task2.fullname\" . }}-users"
#   - name: data
#     persistentVolumeClaim:
#       claimName: "{{ include \"task2.fullname\" . }}-data"
#   # - name: logs
#   #   persistentVolumeClaim:
#   #     claimName: clickhouse-logs

# Additional volumeMounts on the output Deployment definition.
volumeMounts: 
  - name: config
    mountPath: "/etc/clickhouse-server/config.xml"
    subPath: config.xml
  - name: users
    mountPath: "/etc/clickhouse-server/users.xml"
    subPath: users.xml
  - name: data
    mountPath: "/var/lib/clickhouse"
  - name: logs
    mountPath: "/var/log/clickhouse-server"

nodeSelector: {}

tolerations: []

affinity: {}

users:
  user1Password: 1234